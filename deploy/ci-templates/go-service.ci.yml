# CALLER TEMPLATE for an OmniSurg Go service repo (the 12 services + admin-bff).
#
# plan-ab copies THIS file into the target repo's .github/workflows/ci.yml BEFORE
# the repo's first orphan commit, so the very first push runs CI (and, once the
# environment is bootstrapped and DEPLOY_<ENV>_ENABLED is set, deploys). A
# reusable `workflow_call` workflow cannot be push-triggered on its own, so every
# code repo carries this thin caller.
#
# BEFORE copying, replace the ONE placeholder below:
#   compose_service:  the service name INSIDE deploy/<env>/docker-compose.yml
#                     (e.g. identity-service), NOT the repo name.
#
# The reusable workflows referenced here live in omnisurg-infrastructure. Neither
# this file nor the reusable workflows contain the VPS IP or any secret; hosts and
# credentials arrive only through ${{ secrets.* }} / ${{ vars.* }} (spec 8.1).
name: ci

on:
  push:
    branches: [develop, main]
  pull_request:

# One in-flight run per ref; a newer push cancels an older queued run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # Local gate on every push and PR; builds and pushes the private ghcr image on
  # a push to develop (:sha, :staging) or main (:sha, :prod).
  ci:
    uses: OmniSurg/omnisurg-infrastructure/.github/workflows/reusable-go-service-ci.yml@main
    permissions:
      contents: read
      packages: write
    secrets: inherit

  # GATED deploy. Both deploy jobs (staging, production) live in the reusable
  # workflow, each carrying its own `if: vars.DEPLOY_<ENV>_ENABLED` guard AND its
  # `environment:` binding; the production Environment is approval-protected.
  deploy:
    needs: ci
    uses: OmniSurg/omnisurg-infrastructure/.github/workflows/reusable-deploy.yml@main
    with:
      # REPLACE with this repo's service name inside the deploy compose file.
      compose_service: REPLACE-WITH-COMPOSE-SERVICE-NAME
      image_tag: ${{ github.sha }}
    secrets: inherit
