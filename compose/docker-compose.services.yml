      - "9085:9085"

  billing-service:
    build:
      context: ../..
      dockerfile: omnisurg-billing-service/Dockerfile.compose
    image: omnisurg-billing-service:local
    container_name: omnisurg-billing-service
    restart: unless-stopped
    environment:
      OMNISURG_ENV: local
      OMNISURG_LOG_LEVEL: ${OMNISURG_LOG_LEVEL:-info}
      OMNISURG_HTTP_PORT: 8086
      OMNISURG_GRPC_PORT: 9086
      OMNISURG_DATABASE_URL: postgres://omnisurg_billing:${POSTGRES_PASSWORD:-omnisurg-local-only}@postgres:5432/omnisurg_billing?sslmode=disable
      OMNISURG_MIGRATIONS_TABLE: billing_schema_migrations
      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      OMNISURG_INTERNAL_API_KEY: ${OMNISURG_INTERNAL_API_KEY:-local-internal-key-change-me}
      # FX hop: billing reaches currency over HTTP by service name.
      OMNISURG_CURRENCY_BASE_URL: http://currency-service:8092
      OMNISURG_CORS_ORIGINS: ${OMNISURG_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
      postgres:
        condition: service_healthy
      currency-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/api/v1/billing/health > /dev/null"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 6
    networks: [omnisurg_net]
    ports:
      - "8086:8086"
      - "9086:9086"

  payment-service:
    build:
      context: ../..
      dockerfile: omnisurg-payment-service/Dockerfile.compose
    image: omnisurg-payment-service:local
    container_name: omnisurg-payment-service
    restart: unless-stopped
    environment:
      OMNISURG_ENV: local
      OMNISURG_LOG_LEVEL: ${OMNISURG_LOG_LEVEL:-info}
      OMNISURG_HTTP_PORT: 8087
      OMNISURG_GRPC_PORT: 9087
      OMNISURG_DATABASE_URL: postgres://omnisurg_payment:${POSTGRES_PASSWORD:-omnisurg-local-only}@postgres:5432/omnisurg_payment?sslmode=disable
      OMNISURG_MIGRATIONS_TABLE: payment_schema_migrations
      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      # NOTE: OMNISURG_BILLING_BASE_URL is intentionally UNSET for payment-service.
      # The optional billing cross-read is OFF by default in P1 (per the platform
      # design and the payment-service docs): the admin-bff supplies the invoice
      # context and payment trusts the request, recording cash and advancing the
      # per-invoice paid total with NO live billing call. On the BFF gRPC path the
      # payment service forwards no caller bearer token, so enabling the read made
      # billing return 401 and hard-fail recordPayment with PAYMENT_BILLING_UNAVAILABLE.
      # Only claims-service keeps OMNISURG_BILLING_BASE_URL set (its claim-build path).
      OMNISURG_CORS_ORIGINS: ${OMNISURG_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
      postgres:
        condition: service_healthy
      # HELD: mobile money is a pending shell. The paynow-stub is present for
      # shape only; payment makes no live Paynow call.
      paynow-stub:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/api/v1/payment/health > /dev/null"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 6
    networks: [omnisurg_net]
    ports:
