    restart: unless-stopped
    environment:
      OMNISURG_ENV: local
      OMNISURG_LOG_LEVEL: ${OMNISURG_LOG_LEVEL:-info}
      OMNISURG_HTTP_PORT: 8093
      OMNISURG_GRPC_PORT: 9093
      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      # gRPC peers by compose service name on omnisurg_net.
      OMNISURG_GRPC_IDENTITY_TARGET: identity-service:9081
      OMNISURG_GRPC_TENANT_TARGET: tenant-service:9082
      OMNISURG_GRPC_PATIENT_TARGET: patient-service:9083
      OMNISURG_GRPC_CLINICAL_TARGET: clinical-service:9084
      OMNISURG_GRPC_REFERRAL_TARGET: referral-service:9085
      OMNISURG_GRPC_BILLING_TARGET: billing-service:9086
      OMNISURG_GRPC_PAYMENT_TARGET: payment-service:9087
      OMNISURG_GRPC_CLAIMS_TARGET: claims-service:9088
      OMNISURG_GRPC_NOTIFICATION_TARGET: notification-service:9089
      OMNISURG_GRPC_SCHEDULING_TARGET: scheduling-service:9090
      OMNISURG_GRPC_CURRENCY_TARGET: currency-service:9092
      OMNISURG_GRPC_AUDIT_TARGET: audit-service:9091
      # Login passthrough hits identity REST by service name.
      OMNISURG_IDENTITY_BASE_URL: http://identity-service:8081
      OMNISURG_CORS_ORIGINS: ${OMNISURG_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
      identity-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      clinical-service:
        condition: service_healthy
      referral-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      claims-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      scheduling-service:
        condition: service_healthy
      currency-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8093/healthz > /dev/null"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 6
    networks: [omnisurg_net]
    ports:
      - "8093:8093"
      - "9093:9093"
    # Chunk 3: Traefik routes the local BFF hosts (api/admin/practice.omnisurg.localhost)
    # to admin-bff :8093 via the FILE provider in compose/traefik/dynamic.yml (the
