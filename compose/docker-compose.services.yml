  currency-service:
    build:
      context: ../..
      dockerfile: omnisurg-currency-service/Dockerfile.compose
    image: omnisurg-currency-service:local
    container_name: omnisurg-currency-service
    restart: unless-stopped
    environment:
      OMNISURG_ENV: local
      OMNISURG_LOG_LEVEL: ${OMNISURG_LOG_LEVEL:-info}
      OMNISURG_HTTP_PORT: 8092
      OMNISURG_GRPC_PORT: 9092
      OMNISURG_DATABASE_URL: postgres://omnisurg_currency:${POSTGRES_PASSWORD:-omnisurg-local-only}@postgres:5432/omnisurg_currency?sslmode=disable
      OMNISURG_MIGRATIONS_TABLE: currency_schema_migrations
      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      # Redis caches the latest rate per pair; in-network address by service name.
      OMNISURG_REDIS_ADDR: redis:6379
      OMNISURG_REDIS_PASSWORD: ${REDIS_PASSWORD:-omnisurg-local-only}
      OMNISURG_REDIS_DB: ${OMNISURG_REDIS_DB:-0}
      # FX upstream is the zimrate-stub locally (config var is OMNISURG_ZIMRATE_URL).
      OMNISURG_ZIMRATE_URL: http://zimrate-stub:9003
      OMNISURG_CORS_ORIGINS: ${OMNISURG_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
