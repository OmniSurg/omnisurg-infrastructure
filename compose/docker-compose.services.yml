      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      # Claims reaches billing over HTTP by service name in the claim build path.
      OMNISURG_BILLING_BASE_URL: http://billing-service:8086
      OMNISURG_CORS_ORIGINS: ${OMNISURG_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
      postgres:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/api/v1/claims/health > /dev/null"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 6
    networks: [omnisurg_net]
    ports:
      - "8088:8088"
      - "9088:9088"

  notification-service:
    build:
      context: ../..
      dockerfile: omnisurg-notification-service/Dockerfile.compose
    image: omnisurg-notification-service:local
    container_name: omnisurg-notification-service
    restart: unless-stopped
    environment:
      OMNISURG_ENV: local
      OMNISURG_LOG_LEVEL: ${OMNISURG_LOG_LEVEL:-info}
      OMNISURG_HTTP_PORT: 8089
      OMNISURG_GRPC_PORT: 9089
      OMNISURG_DATABASE_URL: postgres://omnisurg_notification:${POSTGRES_PASSWORD:-omnisurg-local-only}@postgres:5432/omnisurg_notification?sslmode=disable
      OMNISURG_MIGRATIONS_TABLE: notification_schema_migrations
      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      OMNISURG_INTERNAL_API_KEY: ${OMNISURG_INTERNAL_API_KEY:-local-internal-key-change-me}
      # SMS goes through the afrosoft-stub locally. The API key is a required
      # field; it comes from the gitignored infra .env (never committed). The
      # stub does not validate it, but the service config requires it set.
      OMNISURG_AFROSOFT_BASE_URL: ${OMNISURG_AFROSOFT_BASE_URL:-http://afrosoft-stub:9001}
      OMNISURG_AFROSOFT_API_KEY: ${OMNISURG_AFROSOFT_API_KEY:-local-afrosoft-stub-key}
      OMNISURG_AFROSOFT_SENDER_ID: ${OMNISURG_AFROSOFT_SENDER_ID:-OmniSurg}
      OMNISURG_CORS_ORIGINS: ${OMNISURG_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
      postgres:
        condition: service_healthy
      afrosoft-stub:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/api/v1/notification/health > /dev/null"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 6
    networks: [omnisurg_net]
    ports:
      - "8089:8089"
      - "9089:9089"

  scheduling-service:
