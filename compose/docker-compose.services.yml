      OMNISURG_DATABASE_URL: postgres://omnisurg_tenant:${POSTGRES_PASSWORD:-omnisurg-local-only}@postgres:5432/omnisurg_tenant?sslmode=disable
      OMNISURG_MIGRATIONS_TABLE: tenant_schema_migrations
      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      OMNISURG_CORS_ORIGINS: ${OMNISURG_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
