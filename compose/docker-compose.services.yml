# Overlay: the OmniSurg application service containers, layered on top of
# compose/docker-compose.local.yml (postgres, redis, traefik, mailhog, stubs).
# Compose merges the two files; run with both -f flags (the Makefile COMPOSE
# variable does this). The base file owns the shared infra and the network;
# this overlay holds only the app containers.
#
# Build strategy (ADR 0003): each image builds with the omnisurg PARENT dir as
# the context (../.. from this compose/ dir) and a per-service Dockerfile.compose
# so the go.mod replace directives (../omnisurg-go-common, ../omnisurg-proto/gen/go)
# resolve unchanged. The parent-root .dockerignore keeps the context small.
#
# Chunk 1 shipped identity-service. Chunks 2-3 add the remaining 12 app
# services (11 services plus admin-bff) and Traefik routing for the local hosts.
#
# Per-service notes:
# - DB services run their own migrations on start (entrypoint -> golang-migrate
#   against <svc>_schema_migrations) then serve HTTP plus gRPC.
# - admin-bff owns NO database: no migrate step, it dials its gRPC peers by
#   compose service name on omnisurg_net.
# - billing reaches currency over HTTP for the FX hop
#   (OMNISURG_CURRENCY_BASE_URL=http://currency-service:8092).
# - claims reaches billing over HTTP (OMNISURG_BILLING_BASE_URL).
# - notification reaches the afrosoft-stub; currency reaches the zimrate-stub;
#   payment depends on the paynow-stub for shape only (HELD: no live Paynow).
# - Health routes: most services serve /api/v1/<svc>/health (the gin group
#   prefix plus /health). admin-bff serves /healthz.
name: omnisurg

networks:
  # Same name as the base file so compose merges them into one network, not two.
  omnisurg_net:
    name: omnisurg_net

services:
  identity-service:
    build:
      context: ../..
      dockerfile: omnisurg-identity-service/Dockerfile.compose
    image: omnisurg-identity-service:local
    container_name: omnisurg-identity-service
    restart: unless-stopped
    environment:
      OMNISURG_ENV: local
      OMNISURG_LOG_LEVEL: ${OMNISURG_LOG_LEVEL:-info}
      OMNISURG_HTTP_PORT: 8081
      OMNISURG_GRPC_PORT: 9081
      # In-network DB address uses the compose service name, not localhost.
      OMNISURG_DATABASE_URL: postgres://omnisurg_identity:${POSTGRES_PASSWORD:-omnisurg-local-only}@postgres:5432/omnisurg_identity?sslmode=disable
      OMNISURG_MIGRATIONS_TABLE: identity_schema_migrations
      # Non-secret local defaults; one place shared across all services. To use a
      # different local JWT secret or KEK, set these in the gitignored infra .env
      # (one place for the whole stack) per the no-unauthorized-env-change rule.
      OMNISURG_JWT_SECRET: ${OMNISURG_JWT_SECRET:-local-dev-secret-change-me}
      OMNISURG_JWT_TTL_MINUTES: ${OMNISURG_JWT_TTL_MINUTES:-60}
      OMNISURG_KEK_BASE64: ${OMNISURG_KEK_BASE64:-bG9jYWwtZGV2LWtlay0wMDAwMDAwMDAwMDAwMDAwMDA=}
      OMNISURG_INTERNAL_API_KEY: ${OMNISURG_INTERNAL_API_KEY:-local-internal-key-change-me}
      OMNISURG_CORS_ORIGINS: ${OMNISURG_IDENTITY_CORS_ORIGINS:-http://practice.omnisurg.localhost,http://admin.omnisurg.localhost}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/identity/health > /dev/null"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 6
    networks: [omnisurg_net]
    ports:
      - "8081:8081"
      - "9081:9081"

  tenant-service:
    build:
      context: ../..
      dockerfile: omnisurg-tenant-service/Dockerfile.compose
    image: omnisurg-tenant-service:local
    container_name: omnisurg-tenant-service
    restart: unless-stopped
    environment:
      OMNISURG_ENV: local
      OMNISURG_LOG_LEVEL: ${OMNISURG_LOG_LEVEL:-info}
      OMNISURG_HTTP_PORT: 8082
